spring:
  application:
    name: life-enrichment-app

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/life_enrichment}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway manages schema; JPA only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000        # 24 hours
  refresh-expiration-ms: 604800000 # 7 days

# ===== AWS S3 =====
aws:
  region: ${AWS_REGION:us-east-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME:life-enrichment-photos}
    presigned-url-expiry-minutes: 60
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

# ===== TWILIO (SMS) =====
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  from-number: ${TWILIO_FROM_NUMBER}

# ===== FIREBASE (Push) =====
firebase:
  credentials-file: ${FIREBASE_CREDENTIALS_FILE:classpath:firebase-service-account.json}
  # Path to the Firebase service-account JSON file used by the push adapter
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# ===== NOTIFICATIONS =====
notifications:
  activity-reminder-minutes-before: 60   # Send reminder 1 hour before activity
  weekly-digest-cron: "0 0 8 * * MON"    # Every Monday at 8:00 AM

# ===== SPRINGDOC / SWAGGER =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== LOGGING =====
logging:
  level:
    com.lifeenrichment: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

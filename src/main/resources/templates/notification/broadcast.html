<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Announcement</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background-color: #7B1FA2; padding: 24px 32px; }
        .header h1 { color: #ffffff; margin: 0; font-size: 22px; }
        .body { padding: 32px; color: #333333; line-height: 1.6; }
        .body p { margin: 0 0 16px; }
        .broadcast-message { font-size: 16px; background-color: #F3E5F5; border-left: 4px solid #7B1FA2; padding: 16px; border-radius: 4px; margin: 16px 0; }
        .footer { padding: 20px 32px; background-color: #f4f4f4; font-size: 12px; color: #aaaaaa; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Life Enrichment App</h1>
    </div>
    <div class="body">
        <p>Hi <span th:text="${recipientName}">Resident</span>,</p>
        <p>You have a new announcement from <strong th:text="${facilityName}">the facility</strong>:</p>
        <div class="broadcast-message">
            <p th:text="${message}">Broadcast message will appear here.</p>
        </div>
        <p>If you have any questions, please speak with a staff member.</p>
        <p>Warm regards,<br/><strong th:text="${facilityName}">Life Enrichment Facility</strong></p>
    </div>
    <div class="footer">
        &copy; <span th:text="${facilityName}">Life Enrichment App</span>. This is an automated message, please do not reply.
    </div>
</div>
</body>
</html>

name: Deploy — Staging

on:
  # Manual trigger only — automatic deploys enabled in Epic 9 when AWS infra is provisioned
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'Manual staging deploy'

jobs:
  check-credentials:
    name: Check AWS credentials are real
    runs-on: ubuntu-latest
    outputs:
      aws-ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check if AWS credentials are configured (not placeholders)
        id: check
        run: |
          if [ "${{ secrets.AWS_ACCESS_KEY_ID }}" = "placeholder" ] || [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "⚠️  AWS credentials are placeholders — skipping deploy. Configure real credentials in Epic 9."
          else
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ AWS credentials present — proceeding with deploy."
          fi

  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    needs: check-credentials
    if: needs.check-credentials.outputs.aws-ready == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already ran in CI)
        run: mvn package -DskipTests --batch-mode

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: life-enrichment-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest

      - name: Deploy to ECS (Staging)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ecs update-service \
            --cluster life-enrichment-staging \
            --service life-enrichment-app \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}

      - name: Notify deployment
        run: echo "Deployed ${{ github.sha }} to staging ✅ — ${{ github.event.inputs.reason }}"